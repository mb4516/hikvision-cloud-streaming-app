version: '3.8'

services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    ports:
      - "8554:8554"
      - "1935:1935"
      - "8888:8888"
      - "8889:8889"
    environment:
      - MTX_PROTOCOLS=tcp
      - MTX_WEBRTCENABLED=yes
      - MTX_HLSENABLED=yes
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: streaming-backend
    ports:
      - "3000:3000"
    depends_on:
      - mediamtx
    environment:
      - NODE_ENV=production
    restart: unless-stopped
